version: '3.8'

services:
  app:
    build: .
    container_name: grade_app
    restart: always
    volumes:
      - ./grade_system.db:/app/grade_system.db   # 数据库持久化
      - ./uploads:/app/uploads                   # 上传文件持久化
      - ./exports:/app/exports                   # 导出文件持久化
      - ./backups:/app/backups                   # 备份文件持久化
    environment:
      - SECRET_KEY=${SECRET_KEY:-grade-system-prod-2026}
    networks:
      - grade_net

  nginx:
    image: nginx:alpine
    container_name: grade_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/usr/share/nginx/html/uploads
    depends_on:
      - app
    networks:
      - grade_net

networks:
  grade_net:
    driver: bridge
