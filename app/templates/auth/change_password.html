{% extends 'base.html' %}
{% block title %}修改密码{% endblock %}
{% block page_title %}修改密码{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="table-card">
            <div class="card-header"><i class="bi bi-key"></i> 修改密码</div>
            <div class="p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">原密码</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">新密码 (至少6位)</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 确认修改</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
