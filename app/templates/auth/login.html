{% extends 'base.html' %}
{% block title %}登录 - 学生成绩管理系统（刘聿康）{% endblock %}
{% block guest_content %}
<div class="login-bg">
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h3 class="text-center mb-1" style="font-weight:700;">学生成绩管理系统</h3>
        <p class="text-center mb-0" style="font-size:1.25rem;color:#64748B;">刘聿康</p>
        <p class="text-center text-muted mb-4" style="font-size:1.25rem;">Student Grade Management System</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-medium">用户名</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus style="border-left:0;">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium">密码</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required style="border-left:0;">
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label text-muted" for="remember">记住我</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius:10px;font-weight:600;">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </button>
        </form>
        <hr class="my-4">
        <div class="text-center">
            <p class="text-muted small mb-1"><i class="bi bi-info-circle"></i> 学生登录提示</p>
            <p class="small mb-0">初始账号和密码均为学号</p>
        </div>
    </div>
</div>
{% endblock %}
