{% extends 'base.html' %}
{% block title %}{{ '新建班级' if cls is none else '编辑班级' }}{% endblock %}
{% block page_title %}{{ '新建班级' if cls is none else '编辑班级' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <div class="card-header"><i class="bi bi-building"></i> {{ '新建班级' if cls is none else '编辑班级' }}</div>
            <div class="p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label class="form-label small fw-medium">班级名称 *</label><input type="text" name="name" class="form-control" value="{{ cls.name if cls else '' }}" required></div>
                    <div class="row">
                        <div class="col-md-4 mb-3"><label class="form-label small fw-medium">年级</label><input type="text" name="grade" class="form-control" value="{{ cls.grade if cls else '' }}" placeholder="如 23本"></div>
                        <div class="col-md-4 mb-3"><label class="form-label small fw-medium">专业</label><input type="text" name="major" class="form-control" value="{{ cls.major if cls else '' }}"></div>
                        <div class="col-md-4 mb-3"><label class="form-label small fw-medium">学制</label><input type="text" name="duration" class="form-control" value="{{ cls.duration if cls else '' }}" placeholder="如 4年"></div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                    <a href="{{ url_for('admin.class_list') }}" class="btn btn-outline-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
