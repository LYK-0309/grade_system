{% extends 'base.html' %}
{% block title %}{{ '发布通知' if n is none else '编辑通知' }}{% endblock %}
{% block page_title %}{{ '发布通知' if n is none else '编辑通知' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <div class="card-header"><i class="bi bi-megaphone"></i> {{ '发布通知' if n is none else '编辑通知' }}</div>
            <div class="p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label class="form-label small fw-medium">标题 *</label><input type="text" name="title" class="form-control" value="{{ n.title if n else '' }}" required></div>
                    <div class="mb-3"><label class="form-label small fw-medium">内容</label><textarea name="content" class="form-control" rows="5">{{ n.content if n else '' }}</textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-medium">目标角色</label>
                            <select name="target_role" class="form-select">
                                <option value="all" {% if n and n.target_role == 'all' %}selected{% endif %}>所有人</option>
                                <option value="teacher" {% if n and n.target_role == 'teacher' %}selected{% endif %}>教师</option>
                                <option value="student" {% if n and n.target_role == 'student' %}selected{% endif %}>学生</option>
                                <option value="academic" {% if n and n.target_role == 'academic' %}selected{% endif %}>教务管理员</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" name="is_pinned" class="form-check-input" id="is_pinned" {% if n and n.is_pinned %}checked{% endif %}>
                                <label class="form-check-label" for="is_pinned">置顶</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                    <a href="{{ url_for('admin.notification_list') }}" class="btn btn-outline-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
