{% extends 'base.html' %}
{% block title %}{{ '新建课程' if c is none else '编辑课程' }}{% endblock %}
{% block page_title %}{{ '新建课程' if c is none else '编辑课程' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <div class="card-header"><i class="bi bi-book"></i> {{ '新建课程' if c is none else '编辑课程' }}</div>
            <div class="p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label small fw-medium">课程编号 *</label><input type="text" name="course_code" class="form-control" value="{{ c.course_code if c else '' }}" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label small fw-medium">课程名称 *</label><input type="text" name="name" class="form-control" value="{{ c.name if c else '' }}" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-3 mb-3"><label class="form-label small fw-medium">学分</label><input type="number" step="0.5" name="credit" class="form-control" value="{{ c.credit if c else 2.0 }}"></div>
                        <div class="col-md-3 mb-3"><label class="form-label small fw-medium">课时</label><input type="number" name="hours" class="form-control" value="{{ c.hours if c else 32 }}"></div>
                        <div class="col-md-3 mb-3"><label class="form-label small fw-medium">考核类型</label><select name="assessment_type" class="form-select"><option value="考查" {% if c and c.assessment_type == '考查' %}selected{% endif %}>考查</option><option value="考试" {% if c and c.assessment_type == '考试' %}selected{% endif %}>考试</option></select></div>
                        <div class="col-md-3 mb-3"><label class="form-label small fw-medium">学期</label><input type="text" name="semester" class="form-control" value="{{ c.semester if c else '2025-2026-2' }}"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label small fw-medium">授课教师</label><select name="teacher_id" class="form-select"><option value="">请选择</option>{% for t in teachers %}<option value="{{ t.id }}" {% if c and c.teacher_id == t.id %}selected{% endif %}>{{ t.name }}({{ t.teacher_no }})</option>{% endfor %}</select></div>
                        <div class="col-md-6 mb-3"><label class="form-label small fw-medium">班级</label><select name="class_id" class="form-select"><option value="">请选择</option>{% for cls in classes %}<option value="{{ cls.id }}" {% if c and c.class_id == cls.id %}selected{% endif %}>{{ cls.name }}</option>{% endfor %}</select></div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                    <a href="{{ url_for('admin.course_list') }}" class="btn btn-outline-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
