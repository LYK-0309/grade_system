{% extends 'base.html' %}
{% block title %}教师管理{% endblock %}
{% block page_title %}教师管理{% endblock %}
{% block content %}
<div class="table-card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-person-badge"></i> 教师列表</span>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-danger" onclick="batchDelete('teachers')" id="batchDeleteBtn" disabled><i class="bi bi-trash"></i> 批量删除</button>
            <a href="{{ url_for('admin.teacher_form') }}" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg"></i> 新建教师</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th style="width:40px;"><input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleAll(this)"></th><th>工号</th><th>姓名</th><th>院系</th><th>授课数</th><th>操作</th></tr></thead>
            <tbody>
                {% for t in teachers %}
                <tr>
                    <td><input type="checkbox" class="form-check-input item-checkbox" value="{{ t.id }}"></td>
                    <td><strong>{{ t.teacher_no }}</strong></td>
                    <td>{{ t.name }}</td>
                    <td>{{ t.department or '-' }}</td>
                    <td><span class="badge bg-primary">{{ t.courses.count() }}</span></td>
                    <td>
                        <a href="{{ url_for('admin.teacher_form', teacher_id=t.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('admin.teacher_delete', teacher_id=t.id) }}" class="d-inline" onsubmit="return confirm('确定删除?')"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="6" class="text-center text-muted py-4">暂无教师数据</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
function toggleAll(el) {
    document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = el.checked);
    updateBatchBtn();
}
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('item-checkbox')) updateBatchBtn();
});
function updateBatchBtn() {
    const checked = document.querySelectorAll('.item-checkbox:checked').length;
    document.getElementById('batchDeleteBtn').disabled = checked === 0;
}
function batchDelete(target) {
    const checked = document.querySelectorAll('.item-checkbox:checked');
    if (checked.length === 0) return;
    const ids = Array.from(checked).map(c => c.value).join(',');
    if (!confirm(`确定要删除选中的 ${checked.length} 位教师吗？此操作不可恢复！`)) return;

    const formData = new FormData();
    formData.append('target', target);
    formData.append('ids', ids);
    formData.append('csrf_token', '{{ csrf_token() }}');

    fetch('{{ url_for("admin.batch_delete") }}', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
            let msg = data.message;
            if (data.failed && data.failed.length > 0) {
                msg += '\n\n失败详情：\n' + data.failed.join('\n');
            }
            alert(msg);
            location.reload();
        })
        .catch(err => { alert('操作失败: ' + err); });
}
</script>
{% endblock %}
