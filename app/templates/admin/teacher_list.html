{% extends 'base.html' %}
{% block title %}教师管理{% endblock %}
{% block page_title %}教师管理{% endblock %}
{% block content %}
<div class="table-card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-person-badge"></i> 教师列表</span>
        <a href="{{ url_for('admin.teacher_form') }}" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg"></i> 新建教师</a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th>工号</th><th>姓名</th><th>院系</th><th>授课数</th><th>操作</th></tr></thead>
            <tbody>
                {% for t in teachers %}
                <tr>
                    <td><strong>{{ t.teacher_no }}</strong></td>
                    <td>{{ t.name }}</td>
                    <td>{{ t.department or '-' }}</td>
                    <td><span class="badge bg-primary">{{ t.courses.count() }}</span></td>
                    <td>
                        <a href="{{ url_for('admin.teacher_form', teacher_id=t.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('admin.teacher_delete', teacher_id=t.id) }}" class="d-inline" onsubmit="return confirm('确定删除?')"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="text-center text-muted py-4">暂无教师数据</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
